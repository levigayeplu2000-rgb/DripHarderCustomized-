<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fashion JustStyle | Contact</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-image: url(royto.jpeg);
      background-size: cover;
      background-position: center;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(6px);
      padding: 10px 40px;
      z-index: 10;
    }

    .logo h1 {
      font-size: 28px;
      color: rgb(255, 255, 255);
    }

    .navigation a {
      font-size: 18px;
      color: black;
      text-decoration: none;
      margin: 0 15px;
    }

    .navigation a:hover {
      color: red;
    }

    .button button {
      padding: 10px 20px;
      background-color: red;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .button button:hover {
      background-color: rgb(255, 0, 43);
    }

    .contact-container {
      padding: 120px;
      display: flex;
      justify-content: center;
    }

    .contact-form {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 15px;
      max-width: 450px;
      width: 100%;
      text-align: center;
    }

    .contact-form h2 {
      margin-bottom: 20px;
      font-size: 28px;
      color: black;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.3);
    }

    .contact-form button {
      padding: 12px 20px;
      background-color: red;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }

    .contact-form button:hover {
      background-color: rgb(220, 57, 84);
    }

    footer {
      text-align: center;
      margin-top: 40px;
      padding: 20px 0;
    }

    footer a {
      text-decoration: none;
      margin: 0 10px;
      color: black;
    }

    footer a:hover {
      color: red;
    }

    .contact-flex {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      max-width: 1100px;
    }

    .contact-form,
    .location-map {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      padding: 50px;
      border-radius: 15px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .location-map h2 {
      color: black;
      text-align: center;
      font-size: 24px;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">
      <a href="./index.html" style="text-decoration: none;">
        <h1>NoSignofweakness <span style="color: red;">koloqua.co</span></h1>
      </a>
    </div>
    <div class="navigation">
      <a href="./index.html">Home</a>
      <a href="./index.html#about">About</a>
      <a href="./collection.html">Collections</a>
      <a href="./contact.html">Contact</a>
    </div>
    <div class="button">
      <a href="./login.html"><button>Sign Up</button></a>
    </div>
  </div>

  <section class="contact-container">
    <div class="contact-flex">
      <!-- Contact Form -->
      <div class="contact-form">
        <h2>Get in Touch</h2>
        <form>
          <input type="text" name="name" placeholder="Your Name" required />
          <input type="email" name="email" placeholder="Your Email" required />
          <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
          <button type="submit">Send Message</button>
        </form>
      </div>

      <!-- Location Map -->
      <div class="location-map">
        <h2 style="margin-bottom: 15px;">Our Location</h2>
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3912.345469072828!2d76.955295514289!3d11.01684439215648!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ba857d36511a3c3%3A0x56e3d6db9174d98a!2sCoimbatore%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1624015024153!5m2!1sen!2sin"
          width="100%" height="350" style="border:0; border-radius: 12px;" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>
    </div>
  </section>


  <footer>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#collection">Collections</a>
    <a href="#contact">Contact</a>
    <p style="margin-top: 10px;"><b>© 2026 Drip Harder <span style="color: red;">Customized Fashion </span>, Inc</b></p>
  </footer>

</body>

</html>
